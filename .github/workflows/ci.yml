name: CI

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Run spec suite
        run: bundle exec rspec

      - name: Run lint
        run: bundle exec standardrb
